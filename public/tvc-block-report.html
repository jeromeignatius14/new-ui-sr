<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sr DSTE/TVC &#8212; Block Utilisation Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: #fffbe9; color: #111; font-size: 12px; }

.top-header {
  background: #1a1a4e; color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; gap: 12px;
}
.top-header h1 { font-size: 16px; font-weight: 700; }
.top-header p  { font-size: 11px; opacity: .75; margin-top: 3px; }
.badge { background: #e63946; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; margin-top: 4px; }
.clock-box { text-align: right; font-size: 11px; line-height: 1.7; }
.clock-box .time { font-size: 16px; font-weight: 700; }

.container { padding: 14px 12px; }
.last-upd { text-align: right; font-size: 10px; color: #666; margin-bottom: 8px; }
.refresh-btn { background: #1a1a4e; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; margin-left: 8px; }

.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 18px; }
.chart-card { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 14px; }
.chart-card h3 { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; margin-bottom: 10px; }
.chart-wrap { position: relative; height: 200px; }

.section-title { font-size: 12px; font-weight: 700; border-left: 4px solid #e63946; padding-left: 8px; margin: 18px 0 10px; color: #1a1a4e; }

/* ── Dept filter buttons ── */
.dept-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
.dept-bar span { font-size: 11px; font-weight: 700; color: #555; margin-right: 4px; }
.dbt { padding: 6px 18px; border-radius: 20px; border: 2px solid #ccc; background: #fff; font-size: 11px; font-weight: 700; cursor: pointer; color: #555; transition: all .15s; }
.dbt.active       { background: #1a1a4e; color: #fff; border-color: #1a1a4e; }
.dbt.active.trd   { background: #b45309; border-color: #b45309; }
.dbt.active.snt   { background: #1d4ed8; border-color: #1d4ed8; }
.dbt.active.engg  { background: #0f766e; border-color: #0f766e; }

/* Tables */
.tbl-wrap { overflow-x: auto; border: 2px solid #333; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }

.th-grp         { background: #1a1a4e; color: #fff; text-align: center; font-size: 10px; font-weight: 700; padding: 5px 4px; border: 1px solid #333; white-space: nowrap; }
.th-grp.green   { background: #1a6e3f; }
.th-grp.orange  { background: #b45309; }
.th-grp.red-h   { background: #991b1b; }
.th-grp.blue    { background: #1d4ed8; }
.th-grp.teal    { background: #0f766e; }
.th-grp.perf    { background: #4c1d95; }

.th-sub { text-align: center; font-size: 9px; font-weight: 700; padding: 5px 4px; border: 1px solid #aaa; background: #f0f0f0; color: #222; white-space: nowrap; }
.th-sub.r { color: #b91c1c; font-style: italic; }

tbody tr:nth-child(even) { background: #fafafa; }
tbody tr:hover { background: #fffbd0; }
tbody tr.today-row { background: #fffde7; }
tr.totals td { background: #1a1a4e !important; color: #fff; font-weight: 700; }

td { padding: 6px 5px; border: 1px solid #ccc; text-align: center; white-space: nowrap; }
td.date-col { text-align: left; font-weight: 700; background: #f5f5f5; padding-left: 7px; min-width: 72px; }
.red  { color: #dc2626; font-style: italic; font-weight: 700; }
.gray { color: #888; font-size: 9px; }
.dim  { color: #aaa; }

.perf-cell { font-weight: 700; border-radius: 3px; padding: 2px 6px; display: inline-block; }
.perf-low  { background: #fee2e2; color: #dc2626; }
.perf-mid  { background: #fef3c7; color: #92400e; }
.perf-high { background: #d1fae5; color: #065f46; }

.spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; color: #666; }
.spin { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: #1a1a4e; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } .top-header { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<div class="top-header">
  <div>
    <h1>&#9889; Block Utilisation Report &#8212; TVC Division</h1>
    <p>Last 14 days &middot; Live data from RBMS &middot; Auto-refreshes every 5 minutes</p>
    <span class="badge">Sr DSTE/TVC View</span>
  </div>
  <div class="clock-box">
    <div class="time" id="clock"></div>
    <div id="dateline"></div>
    <div>South Railway &middot; TVC Division</div>
  </div>
</div>

<div class="container">
  <div id="root"><div class="spinner"><div class="spin"></div><span>Loading live data&hellip;</span></div></div>
</div>

<script>
const DEPT_API = "https://api-tvc.adrig.co.in/api/analytics/block-funnel-public?days=14";
const REFRESH  = 5 * 60 * 1000;
const DAYS     = 14;
const charts   = {};

const DEPT_CFG = {
  OVERALL: { label:"Overall",  cls:"",     hdr:"#1a1a4e" },
  TRD:     { label:"TRD",      cls:"trd",  hdr:"#b45309" },
  "S&T":   { label:"S&T",      cls:"snt",  hdr:"#1d4ed8" },
  ENGG:    { label:"ENGG",     cls:"engg", hdr:"#0f766e" },
};

// _overallRows — array of {date, req, sanc, applied, exited, permitted, sm_rejected, closed} sorted DESC
// _deptMap — dept → same shape, keyed by the same date set
let _overallRows = [];
let _deptMap     = {};
let _activeDept  = "OVERALL";

// ── Helpers ──────────────────────────────────────────────────────────────────
function tickClock() {
  const ist = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  const p = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent = p(ist.getHours())+":"+p(ist.getMinutes())+":"+p(ist.getSeconds())+" IST";
  document.getElementById("dateline").textContent = ist.toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric",timeZone:"Asia/Kolkata"});
}
setInterval(tickClock,1000); tickClock();

function dc(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function fd(k) { return new Date(k+"T00:00:00Z").toLocaleDateString("en-IN",{day:"2-digit",month:"short",timeZone:"UTC"}); }
function dy(k) { return new Date(k+"T00:00:00Z").toLocaleDateString("en-IN",{weekday:"short",timeZone:"UTC"}); }
function pct(n,d){ return d>0?(n/d*100).toFixed(1)+"%":"&#8212;"; }
function pc(v)  { return v>=50?"perf-high":v>=25?"perf-mid":"perf-low"; }
function todayIST() { return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"}); }
function dateKey(v){
  if(typeof v === "string") return v.slice(0,10);
  return new Date(v).toISOString().slice(0,10);
}

// ── Fetch & process ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DEPT_API);
    const j   = await res.json();
    if(!j.success) throw new Error(j.message);

    // Group raw rows by (date, dept)
    const byDateDept = {}; // date → dept → raw row
    j.data.forEach(r => {
      const d   = dateKey(r.block_date);
      const dep = r.department || "UNKNOWN";
      if(!byDateDept[d]) byDateDept[d] = {};
      byDateDept[d][dep] = r;
    });

    // All distinct IST dates from the API, sorted DESC, capped to DAYS
    const today = todayIST();
    const allDates = Object.keys(byDateDept)
      .filter(d => d <= today)
      .sort()
      .slice(-DAYS)
      .reverse();

    // All departments that appear in the data
    const allDepts = [...new Set(j.data.map(r => r.department || "UNKNOWN"))];

    // Build OVERALL (sum across all depts per date) and per-dept rows
    _overallRows = allDates.map(d => {
      const depts = byDateDept[d] || {};
      return sumDepts(d, Object.values(depts));
    });

    _deptMap = {};
    allDepts.forEach(dep => {
      _deptMap[dep] = allDates.map(d => {
        const r = (byDateDept[d] || {})[dep];
        return r ? toRow(d, r) : emptyRow(d);
      });
    });

    renderAll();
  } catch(e) {
    document.getElementById("root").innerHTML =
      '<div class="spinner"><span style="color:#dc2626">&#9888; Failed: '+e.message+'</span>'+
      '<button class="refresh-btn" onclick="loadData()">Retry</button></div>';
  }
}

function toRow(date, r) {
  return {
    date,
    req:        +r.total_requested || 0,
    sanc:       +r.sanctioned      || 0,
    applied:    +r.applied         || 0,
    exited:     +r.exited          || 0,
    permitted:  +r.permitted       || 0,
    sm_rejected:+r.sm_rejected     || 0,
    closed:     +r.closed          || 0,
  };
}

function emptyRow(date) {
  return { date, req:0, sanc:0, applied:0, exited:0, permitted:0, sm_rejected:0, closed:0 };
}

function sumDepts(date, raws) {
  return raws.reduce((a, r) => ({
    date,
    req:         a.req         + (+r.total_requested || 0),
    sanc:        a.sanc        + (+r.sanctioned      || 0),
    applied:     a.applied     + (+r.applied         || 0),
    exited:      a.exited      + (+r.exited          || 0),
    permitted:   a.permitted   + (+r.permitted       || 0),
    sm_rejected: a.sm_rejected + (+r.sm_rejected     || 0),
    closed:      a.closed      + (+r.closed          || 0),
  }), emptyRow(date));
}

// ── Build table rows ──────────────────────────────────────────────────────────
function buildRows(dept) {
  const rows = dept === "OVERALL" ? _overallRows : (_deptMap[dept] || []);
  const today = todayIST();

  const trs = rows.map(d => {
    const isT = d.date === today;
    const inactApply = Math.max(0, d.sanc - d.applied - d.exited);
    const inactSM    = Math.max(0, d.applied - d.permitted - d.sm_rejected);
    const notClosed  = Math.max(0, d.permitted - d.closed);
    const fu = d.sanc > 0 ? d.permitted / d.sanc * 100 : 0;
    const ci = d.sanc > 0 ? d.closed    / d.sanc * 100 : 0;

    return '<tr class="'+(isT?"today-row":"")+'">'+
      '<td class="date-col">'+fd(d.date)+'<br><span class="gray">'+dy(d.date)+'</span>'+(isT?' &#9733;':'')+'</td>'+
      '<td>'+d.req+'</td>'+
      '<td><strong>'+d.sanc+'</strong></td>'+
      '<td>'+d.applied+'</td>'+
      '<td class="red">'+d.exited+'</td>'+
      '<td class="red">'+inactApply+'</td>'+
      '<td><strong>'+d.permitted+'</strong></td>'+
      '<td class="red">'+d.sm_rejected+'</td>'+
      '<td class="red">'+inactSM+'</td>'+
      '<td><strong>'+d.closed+'</strong></td>'+
      '<td class="red">'+notClosed+'</td>'+
      '<td><span class="perf-cell '+pc(fu)+'">'+pct(d.permitted,d.sanc)+'</span></td>'+
      '<td><span class="perf-cell '+pc(ci)+'">'+pct(d.closed,d.sanc)+'</span></td>'+
    '</tr>';
  }).join("");

  // Totals row
  const tot = rows.reduce((a, d) => ({
    req:         a.req         + d.req,
    sanc:        a.sanc        + d.sanc,
    applied:     a.applied     + d.applied,
    exited:      a.exited      + d.exited,
    permitted:   a.permitted   + d.permitted,
    sm_rejected: a.sm_rejected + d.sm_rejected,
    closed:      a.closed      + d.closed,
  }), {req:0,sanc:0,applied:0,exited:0,permitted:0,sm_rejected:0,closed:0});

  const tInact = Math.max(0, tot.sanc - tot.applied - tot.exited);
  const tInactSM = Math.max(0, tot.applied - tot.permitted - tot.sm_rejected);
  const tNotClosed = Math.max(0, tot.permitted - tot.closed);

  const totRow = '<tr class="totals">'+
    '<td class="date-col">14-DAY TOTAL</td>'+
    '<td>'+tot.req+'</td>'+
    '<td>'+tot.sanc+'</td>'+
    '<td>'+tot.applied+'</td>'+
    '<td>'+tot.exited+'</td>'+
    '<td>'+tInact+'</td>'+
    '<td>'+tot.permitted+'</td>'+
    '<td>'+tot.sm_rejected+'</td>'+
    '<td>'+tInactSM+'</td>'+
    '<td>'+tot.closed+'</td>'+
    '<td>'+tNotClosed+'</td>'+
    '<td>'+pct(tot.permitted,tot.sanc)+'</td>'+
    '<td>'+pct(tot.closed,tot.sanc)+'</td>'+
  '</tr>';

  return trs + totRow;
}

// ── Render table only (on dept switch) ───────────────────────────────────────
function renderTable(dept) {
  const cfg = DEPT_CFG[dept] || DEPT_CFG.OVERALL;
  document.getElementById("tbl-body").innerHTML = buildRows(dept);
  document.querySelectorAll(".dyn-hdr").forEach(el => { el.style.background = cfg.hdr; });
  renderBarChart(dept);
}

// ── Full render (first load) ──────────────────────────────────────────────────
function renderAll() {
  const now = new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata",hour12:false,day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});

  const deptOrder = ["OVERALL","TRD","S&T","ENGG"];
  const extraDepts = Object.keys(_deptMap).filter(d => !deptOrder.includes(d));
  const allDepts = [...deptOrder.filter(d => d==="OVERALL" || _deptMap[d]), ...extraDepts];

  const buttons = allDepts.map(d => {
    const cfg = DEPT_CFG[d] || {label:d, cls:"", hdr:"#1a1a4e"};
    return '<button class="dbt'+(d===_activeDept?" active"+(cfg.cls?" "+cfg.cls:""):"")+'" onclick="switchDept(\''+d+'\')">'+cfg.label+'</button>';
  }).join("");

  const thead =
    '<thead>'+
      '<tr>'+
        '<th class="th-grp dyn-hdr" rowspan="2" style="background:#1a1a4e;width:72px">DATE</th>'+
        '<th class="th-grp dyn-hdr green"  colspan="2">BLOCK</th>'+
        '<th class="th-grp dyn-hdr orange" colspan="3">AVAILING APPLICATION</th>'+
        '<th class="th-grp dyn-hdr blue"   colspan="3">SM / TPC PERMIT</th>'+
        '<th class="th-grp dyn-hdr teal"   colspan="2">CLOSURE</th>'+
        '<th class="th-grp dyn-hdr perf"   colspan="2">PERFORMANCE</th>'+
      '</tr>'+
      '<tr>'+
        '<th class="th-sub">REQUESTED</th>'+
        '<th class="th-sub">SANCTIONED</th>'+
        '<th class="th-sub">APPLIED</th>'+
        '<th class="th-sub r">EXITED W/O<br>AVAILING</th>'+
        '<th class="th-sub r">INACTION</th>'+
        '<th class="th-sub">PERMITTED</th>'+
        '<th class="th-sub r">REJECTED</th>'+
        '<th class="th-sub r">INACTION</th>'+
        '<th class="th-sub">CLOSED</th>'+
        '<th class="th-sub r">NOT CLOSED</th>'+
        '<th class="th-sub">FIELD UTIL<br>INDEX</th>'+
        '<th class="th-sub">CONCLUSION<br>INDEX</th>'+
      '</tr>'+
    '</thead>';

  document.getElementById("root").innerHTML =
    '<div class="last-upd">Last fetched: '+now+' IST <button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button></div>'+

    '<div class="charts-row">'+
      '<div class="chart-card"><h3>Daily Pipeline &#8212; Last 14 Days</h3><div class="chart-wrap"><canvas id="bar"></canvas></div></div>'+
      '<div class="chart-card"><h3>14-Day Funnel</h3><div class="chart-wrap"><canvas id="pie"></canvas></div></div>'+
    '</div>'+

    '<div class="section-title">&#128203; Day-wise Block Flow &#8212; Last 14 Days</div>'+
    '<div class="dept-bar"><span>View:</span>'+buttons+'</div>'+
    '<div class="tbl-wrap"><table>'+thead+'<tbody id="tbl-body">'+buildRows(_activeDept)+'</tbody></table></div>'+

    '<div style="margin-top:10px;font-size:10px;color:#999;text-align:center">'+
      'INACTION = blocks pending at that stage &middot; '+
      'Field Util = Permitted &divide; Sanctioned &middot; Conclusion = Closed &divide; Sanctioned &middot; '+
      'TRD + S&T + ENGG + UNKNOWN = Overall (single consistent source)'+
    '</div>'+
    '<div style="text-align:center;padding:12px 0 6px;font-size:10px;color:#bbb">South Railway &middot; TVC Division &middot; Sr DSTE/TVC View &middot; Refreshes every 5 min</div>';

  renderBarChart(_activeDept);
  renderPieChart();
}

// ── Charts ────────────────────────────────────────────────────────────────────
function renderBarChart(dept) {
  dc("bar");
  const rows = (dept === "OVERALL" ? _overallRows : (_deptMap[dept] || [])).slice().reverse();
  const labels = rows.map(d => fd(d.date));
  charts["bar"] = new Chart(document.getElementById("bar").getContext("2d"), {
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"Sanctioned", data:rows.map(d=>d.sanc),       backgroundColor:"#10b98166",borderColor:"#10b981",borderWidth:1.5},
        {label:"Applied",    data:rows.map(d=>d.applied),    backgroundColor:"#f59e0b66",borderColor:"#f59e0b",borderWidth:1.5},
        {label:"Permitted",  data:rows.map(d=>d.permitted),  backgroundColor:"#3b82f666",borderColor:"#3b82f6",borderWidth:1.5},
        {label:"Closed",     data:rows.map(d=>d.closed),     backgroundColor:"#10b98199",borderColor:"#059669",borderWidth:1.5},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"top",labels:{font:{size:10},boxWidth:12}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{font:{size:9}}}}}
  });
}

function renderPieChart() {
  dc("pie");
  const tot = _overallRows.reduce((a,d) => ({
    req:     a.req     + d.req,
    sanc:    a.sanc    + d.sanc,
    applied: a.applied + d.applied,
    perm:    a.perm    + d.permitted,
    closed:  a.closed  + d.closed,
  }), {req:0,sanc:0,applied:0,perm:0,closed:0});

  charts["pie"] = new Chart(document.getElementById("pie").getContext("2d"), {
    type:"doughnut",
    data:{
      labels:["Not Sanctioned","Sanc not Applied","Applied not Permitted","Permitted not Closed","Closed"],
      datasets:[{data:[
        Math.max(0,tot.req-tot.sanc),
        Math.max(0,tot.sanc-tot.applied),
        Math.max(0,tot.applied-tot.perm),
        Math.max(0,tot.perm-tot.closed),
        tot.closed
      ],backgroundColor:["#94a3b8","#fbbf24","#f97316","#6d28d9","#10b981"],borderWidth:2}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:9},boxWidth:12}}}}
  });
}

// ── Dept switch ───────────────────────────────────────────────────────────────
window.switchDept = function(dept) {
  _activeDept = dept;
  document.querySelectorAll(".dbt").forEach(b => { b.classList.remove("active","trd","snt","engg"); });
  const deptOrder = ["OVERALL","TRD","S&T","ENGG"];
  const allD = ["OVERALL","TRD","S&T","ENGG",...Object.keys(_deptMap).filter(d=>!["TRD","S&T","ENGG"].includes(d))];
  const idx = allD.indexOf(dept);
  const btns = document.querySelectorAll(".dbt");
  if(btns[idx]){
    const cfg = DEPT_CFG[dept] || {cls:""};
    btns[idx].classList.add("active");
    if(cfg.cls) btns[idx].classList.add(cfg.cls);
  }
  renderTable(dept);
};

loadData();
setInterval(loadData, REFRESH);
</script>
</body>
</html>
