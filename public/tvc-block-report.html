<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sr DSTE/TVC — Block Utilisation Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #fffbe9;
  --header-bg: #1a1a4e;
  --text: #111;
  --muted: #555;
  --border: #bbb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); font-size: 12px; }

/* ── Header ── */
.top-header {
  background: var(--header-bg); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; gap: 12px;
}
.top-header h1 { font-size: 16px; font-weight: 700; }
.top-header p  { font-size: 11px; opacity: .75; margin-top: 3px; }
.badge { background: #e63946; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; margin-top: 4px; }
.clock-box { text-align: right; font-size: 11px; line-height: 1.7; }
.clock-box .time { font-size: 16px; font-weight: 700; }

/* ── Container ── */
.container { padding: 14px 12px; max-width: 100%; }
.last-upd { text-align: right; font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.refresh-btn { background: var(--header-bg); color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; margin-left: 8px; }

/* ── Charts row ── */
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 18px; }
.chart-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.chart-card h3 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
.chart-wrap { position: relative; height: 200px; }

/* ── Section title ── */
.section-title {
  font-size: 12px; font-weight: 700; border-left: 4px solid #e63946;
  padding-left: 8px; margin: 18px 0 8px; color: var(--header-bg);
}

/* ── Main Table ── */
.tbl-wrap { overflow-x: auto; border: 2px solid #333; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; min-width: 1300px; font-size: 11px; }

.th-group { background: #1a1a4e; color: #fff; text-align: center; font-size: 10px; font-weight: 700; padding: 4px 3px; border: 1px solid #333; white-space: nowrap; }
.th-group.green  { background: #1a6e3f; }
.th-group.yellow { background: #7a5c00; }
.th-group.purple { background: #4c1d95; }
.th-group.blue   { background: #1d4ed8; }
.th-group.teal   { background: #0f766e; }
.th-group.perf   { background: #7f1d1d; }

.th-sub { text-align: center; font-size: 9px; font-weight: 700; padding: 4px 3px; border: 1px solid #aaa; white-space: nowrap; background: #f0f0f0; color: #222; }
.th-sub.red-label { color: #b91c1c; font-style: italic; font-size: 9px; }

tbody tr:nth-child(even) { background: #fafafa; }
tbody tr:hover { background: #fffbd0; }
tbody tr.today-row { background: #fffde7; }

td { padding: 5px 4px; border: 1px solid #ccc; text-align: center; white-space: nowrap; }
td:first-child { text-align: left; font-weight: 700; background: #f5f5f5; padding-left: 6px; }
.num  { font-weight: 700; }
.red  { color: #dc2626; font-style: italic; font-weight: 700; }
.gray { color: #888; font-size: 9px; }

.perf-cell { font-weight: 700; border-radius: 3px; padding: 2px 4px; display: inline-block; }
.perf-low  { background: #fee2e2; color: #dc2626; }
.perf-mid  { background: #fef3c7; color: #92400e; }
.perf-high { background: #d1fae5; color: #065f46; }

tr.totals td { background: #1a1a4e !important; color: #fff; font-weight: 700; }

.spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; color: var(--muted); }
.spin { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: var(--header-bg); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } .top-header { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<div class="top-header">
  <div>
    <h1>&#9889; Block Utilisation Report &#8212; TVC Division</h1>
    <p>Last 14 days &middot; Live data from RBMS &middot; Same as Analyse in Detail &middot; Auto-refreshes every 5 minutes</p>
    <span class="badge">Sr DSTE/TVC View</span>
  </div>
  <div class="clock-box">
    <div class="time" id="clock"></div>
    <div id="dateline"></div>
    <div>South Railway &middot; TVC Division</div>
  </div>
</div>

<div class="container">
  <div id="root"><div class="spinner"><div class="spin"></div><span>Loading live data&hellip;</span></div></div>
</div>

<script>
const API = "https://api-tvc.adrig.co.in/api/analytics/rbms-dashboard";
const REFRESH_MS = 5 * 60 * 1000;
const DAYS = 14;
const charts = {};

function tickClock() {
  const ist = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
  const p = n => String(n).padStart(2, "0");
  document.getElementById("clock").textContent = p(ist.getHours())+":"+p(ist.getMinutes())+":"+p(ist.getSeconds())+" IST";
  document.getElementById("dateline").textContent = ist.toLocaleDateString("en-IN", { weekday:"long", day:"2-digit", month:"long", year:"numeric", timeZone:"Asia/Kolkata" });
}
setInterval(tickClock, 1000); tickClock();

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

async function loadData() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (!json.status) throw new Error(json.message);
    render(json.data);
  } catch (e) {
    document.getElementById("root").innerHTML = '<div class="spinner"><span style="color:#dc2626;">&#9888;&#65039; Failed: '+e.message+'</span><button class="refresh-btn" onclick="loadData()">Retry</button></div>';
  }
}

function fmtDate(k) {
  return new Date(k + "T00:00:00Z").toLocaleDateString("en-IN", { day:"2-digit", month:"short", timeZone:"UTC" });
}
function fmtDay(k) {
  return new Date(k + "T00:00:00Z").toLocaleDateString("en-IN", { weekday:"short", timeZone:"UTC" });
}
function pct(n, d) { return d > 0 ? (n / d * 100).toFixed(1) + "%" : "&#8212;"; }
function perfClass(v) { return v >= 50 ? "perf-high" : v >= 25 ? "perf-mid" : "perf-low"; }
function istToday() { return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Kolkata" }); }

function render(data) {
  const allDays = (data.days || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const today = istToday();
  const last14 = allDays.filter(d => d.date <= today).slice(-DAYS).reverse(); // newest first
  const chartRows = last14.slice().reverse(); // oldest first for chart

  // Totals across 14 days
  const tot = last14.reduce((a, d) => {
    a.req += d.req; a.sanc += d.sanc;
    a.reqOnDate += d.reqOnDate; a.sancOnDate += d.sancOnDate;
    a.sseAck += d.sseAck; a.sseRej += d.sseRej;
    a.applied += d.applied; a.exited += d.exited;
    a.smPermitted += d.smPermitted; a.smRej += d.smRej;
    a.availed += d.availed; a.closed += d.closed;
    a.closedPD += d.closedPD;
    return a;
  }, { req:0,sanc:0,reqOnDate:0,sancOnDate:0,sseAck:0,sseRej:0,applied:0,exited:0,smPermitted:0,smRej:0,availed:0,closed:0,closedPD:0 });

  // Latest cumulative figures come from the most recent day in the full dataset
  const latest = allDays[allDays.length - 1] || {};

  const trs = last14.map(d => {
    const isToday = d.date === today;
    const sseInact   = Math.max(0, d.sanc - d.sseAck - d.sseRej);
    const applyInact = Math.max(0, d.sseAck - d.applied - d.exited);
    const smInact    = Math.max(0, d.applied - d.smPermitted - d.smRej);
    const notClosed  = Math.max(0, d.availed - d.closedPD);
    const fieldUtil  = d.sanc > 0 ? d.availed / d.sanc * 100 : 0;
    const conclusion = d.sanc > 0 ? d.closed  / d.sanc * 100 : 0;

    return '<tr class="'+(isToday?"today-row":"")+'">'+
      '<td>'+fmtDate(d.date)+'<br><span class="gray">'+fmtDay(d.date)+'</span>'+(isToday?' &#9733;':'')+'</td>'+
      '<td class="num">'+d.reqOnDate+'</td>'+
      '<td class="num">'+d.sancOnDate+'</td>'+
      '<td class="num">'+d.req+'</td>'+
      '<td class="num">'+d.sanc+'</td>'+
      '<td class="num">'+d.sseAck+'</td>'+
      '<td class="num red">'+d.sseRej+'</td>'+
      '<td class="num red">'+sseInact+'</td>'+
      '<td class="num red">'+(d.cumInactApply ?? '&#8212;')+'</td>'+
      '<td class="num">'+d.applied+'</td>'+
      '<td class="num red">'+d.exited+'</td>'+
      '<td class="num red">'+applyInact+'</td>'+
      '<td class="num red">'+(d.cumInactSM ?? '&#8212;')+'</td>'+
      '<td class="num">'+d.smPermitted+'</td>'+
      '<td class="num red">'+d.smRej+'</td>'+
      '<td class="num red">'+smInact+'</td>'+
      '<td class="num red">'+(d.cumInactClose ?? '&#8212;')+'</td>'+
      '<td class="num">'+d.availed+'</td>'+
      '<td class="num red">'+notClosed+'</td>'+
      '<td class="num red">'+(d.cumInactClose ?? '&#8212;')+'</td>'+
      '<td><span class="perf-cell '+perfClass(fieldUtil)+'">'+pct(d.availed, d.sanc)+'</span></td>'+
      '<td><span class="perf-cell '+perfClass(conclusion)+'">'+pct(d.closed, d.sanc)+'</span></td>'+
    '</tr>';
  }).join("");

  const totSseInact   = Math.max(0, tot.sanc - tot.sseAck - tot.sseRej);
  const totApplyInact = Math.max(0, tot.sseAck - tot.applied - tot.exited);
  const totSmInact    = Math.max(0, tot.applied - tot.smPermitted - tot.smRej);
  const totNotClosed  = Math.max(0, tot.availed - tot.closedPD);

  const totRow = '<tr class="totals">'+
    '<td>14-DAY TOTAL</td>'+
    '<td>'+tot.reqOnDate+'</td><td>'+tot.sancOnDate+'</td>'+
    '<td>'+tot.req+'</td><td>'+tot.sanc+'</td>'+
    '<td>'+tot.sseAck+'</td><td>'+tot.sseRej+'</td>'+
    '<td>'+totSseInact+'</td><td>'+(latest.cumInactApply ?? '&#8212;')+'</td>'+
    '<td>'+tot.applied+'</td><td>'+tot.exited+'</td>'+
    '<td>'+totApplyInact+'</td><td>'+(latest.cumInactSM ?? '&#8212;')+'</td>'+
    '<td>'+tot.smPermitted+'</td><td>'+tot.smRej+'</td>'+
    '<td>'+totSmInact+'</td><td>'+(latest.cumInactClose ?? '&#8212;')+'</td>'+
    '<td>'+tot.availed+'</td><td>'+totNotClosed+'</td><td>'+(latest.cumInactClose ?? '&#8212;')+'</td>'+
    '<td>'+pct(tot.availed, tot.sanc)+'</td>'+
    '<td>'+pct(tot.closed, tot.sanc)+'</td>'+
  '</tr>';

  const now = new Date().toLocaleString("en-IN", { timeZone:"Asia/Kolkata", hour12:false, day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });

  document.getElementById("root").innerHTML =
    '<div class="last-upd">Last fetched: '+now+' IST <button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button></div>'+

    '<div class="charts-row">'+
      '<div class="chart-card"><h3>Daily Block Pipeline (Last 14 Days)</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>'+
      '<div class="chart-card"><h3>14-Day Funnel Distribution</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>'+
    '</div>'+

    '<div class="section-title">&#128203; Analyse in Detail &#8212; Last 14 Days (TVC Division)</div>'+
    '<div class="tbl-wrap"><table>'+
      '<thead>'+
        '<tr>'+
          '<th class="th-group" rowspan="3" style="width:75px">DATE</th>'+
          '<th class="th-group green" colspan="2">BLOCK DATE &#8212; ANY</th>'+
          '<th class="th-group green" colspan="2">BLOCK DATE &#8212; TODAY</th>'+
          '<th class="th-group yellow" colspan="4">SSE / JE &#8212; ACKNOWLEDGEMENT<br><span style="font-size:8px;font-weight:400">of Sanctioned For Date</span></th>'+
          '<th class="th-group purple" colspan="4">SSE / JE &#8212; AVAILING APPLIED<br><span style="font-size:8px;font-weight:400">of Acknowledged</span></th>'+
          '<th class="th-group blue" colspan="4">SM / TPC &#8212; PERMIT<br><span style="font-size:8px;font-weight:400">of Applied</span></th>'+
          '<th class="th-group teal" colspan="3">OUTCOME<br><span style="font-size:8px;font-weight:400">of Sanctioned for Date</span></th>'+
          '<th class="th-group perf" colspan="2">PERFORMANCE</th>'+
        '</tr>'+
        '<tr>'+
          '<th class="th-sub" rowspan="2">REQUESTS<br>CREATED<br>TODAY</th>'+
          '<th class="th-sub" rowspan="2">REQUESTS<br>SANCTIONED<br>ON DATE</th>'+
          '<th class="th-sub" rowspan="2">REQUESTS<br>FOR<br>SANCTIONING<br>TODAY</th>'+
          '<th class="th-sub" rowspan="2">SANCTIONED<br>FOR DATE &#9733;</th>'+
          '<th class="th-sub" rowspan="2">ACKNOWLEDGED</th>'+
          '<th class="th-sub red-label" rowspan="2">REJECTED</th>'+
          '<th class="th-sub red-label" colspan="2">INACTION</th>'+
          '<th class="th-sub" rowspan="2">APPLIED</th>'+
          '<th class="th-sub red-label" rowspan="2">EXITED<br>W/O<br>AVAILING</th>'+
          '<th class="th-sub red-label" colspan="2">INACTION</th>'+
          '<th class="th-sub" rowspan="2">PERMITTED</th>'+
          '<th class="th-sub red-label" rowspan="2">REJECTED</th>'+
          '<th class="th-sub red-label" colspan="2">INACTION</th>'+
          '<th class="th-sub" rowspan="2">AVAILED</th>'+
          '<th class="th-sub red-label" colspan="2">NOT CLOSED</th>'+
          '<th class="th-sub" rowspan="2">FIELD UTIL<br>INDEX</th>'+
          '<th class="th-sub" rowspan="2">CONCLUSION<br>INDEX</th>'+
        '</tr>'+
        '<tr>'+
          '<th class="th-sub red-label">TODAY\'S</th><th class="th-sub red-label">CUMULATIVE &#9658;</th>'+
          '<th class="th-sub red-label">TODAY\'S</th><th class="th-sub red-label">CUMULATIVE &#9658;</th>'+
          '<th class="th-sub red-label">TODAY\'S</th><th class="th-sub red-label">CUMULATIVE &#9658;</th>'+
          '<th class="th-sub red-label">TODAY\'S</th><th class="th-sub red-label">CUMULATIVE &#9658;</th>'+
        '</tr>'+
      '</thead>'+
      '<tbody>'+trs+totRow+'</tbody>'+
    '</table></div>'+

    '<div style="margin-top:10px;font-size:10px;color:#777;text-align:center">'+
      '<b>Notes:</b> Field Util = Availed &divide; Sanctioned for Date &middot; '+
      'Conclusion = Closed &divide; Sanctioned for Date &middot; '+
      'INACTION Today\'s = pending as of block\'s own date &middot; '+
      'CUMULATIVE &#9658; = carry-forward across all cohorts (live) &middot; '+
      'Data: RBMS TVC (same source as Analyse in Detail)'+
    '</div>'+
    '<div style="text-align:center;padding:14px 0 6px;font-size:10px;color:#aaa">'+
      'South Railway &middot; TVC Division &middot; RBMS Block Report &middot; Sr DSTE/TVC View &middot; Refreshes every 5 min'+
    '</div>';

  // Bar chart
  destroyChart("barChart");
  charts["barChart"] = new Chart(document.getElementById("barChart").getContext("2d"), {
    type: "bar",
    data: {
      labels: chartRows.map(d => fmtDate(d.date)),
      datasets: [
        { label:"Sanctioned", data: chartRows.map(d=>d.sanc),        backgroundColor:"#10b98188", borderColor:"#10b981", borderWidth:1.5 },
        { label:"Applied",    data: chartRows.map(d=>d.applied),      backgroundColor:"#f59e0b88", borderColor:"#f59e0b", borderWidth:1.5 },
        { label:"Permitted",  data: chartRows.map(d=>d.smPermitted),  backgroundColor:"#6d28d988", borderColor:"#6d28d9", borderWidth:1.5 },
        { label:"Availed",    data: chartRows.map(d=>d.availed),      backgroundColor:"#3b82f688", borderColor:"#3b82f6", borderWidth:1.5 },
        { label:"Closed",     data: chartRows.map(d=>d.closed),       backgroundColor:"#ef444488", borderColor:"#ef4444", borderWidth:1.5 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:"top", labels:{ font:{size:10}, boxWidth:12 } } },
      scales:{ x:{ grid:{display:false}, ticks:{font:{size:9}} }, y:{ beginAtZero:true, ticks:{font:{size:9}} } }
    }
  });

  // Pie chart
  destroyChart("pieChart");
  charts["pieChart"] = new Chart(document.getElementById("pieChart").getContext("2d"), {
    type: "doughnut",
    data: {
      labels: ["Not Sanctioned","Sanc not Ack'd","Ack'd not Applied","Applied not Permitted","Availed"],
      datasets:[{ data:[
        Math.max(0, tot.req - tot.sanc),
        Math.max(0, tot.sanc - tot.sseAck - tot.sseRej),
        Math.max(0, tot.sseAck - tot.applied - tot.exited),
        Math.max(0, tot.applied - tot.smPermitted - tot.smRej),
        tot.availed
      ], backgroundColor:["#94a3b8","#fbbf24","#f97316","#6d28d9","#10b981"], borderWidth:2 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"right", labels:{ font:{size:9}, boxWidth:12 } } } }
  });
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
